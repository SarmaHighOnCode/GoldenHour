services:
  - type: web
    name: goldenhour-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: MSG91_AUTH_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0
