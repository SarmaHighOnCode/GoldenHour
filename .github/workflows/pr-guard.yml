name: PR Guard

on:
  pull_request:
    branches: [ main ]

jobs:
  check-conflict:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Fail if leftover conflict markers are present
      run: |
        echo "Scanning for unresolved merge conflict markers..."
        if git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- . ':(exclude).github/**'; then
          echo "::error::Unresolved merge conflict markers found. Resolve them before merging."
          exit 1
        fi
        echo "No conflict markers found."
