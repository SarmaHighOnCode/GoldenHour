name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
    - name: Install Dependencies
      # npm install (not npm ci) tolerates cross-platform optional-dependency
      # lock drift — the lock is generated across Windows/macOS/Linux dev boxes
      # and native bindings (Tailwind oxide, rolldown) differ per platform.
      run: cd frontend && npm install
    - name: Build
      run: cd frontend && npm run build
    # - name: Test
    #   run: cd frontend && npm run test (if tests are added)
